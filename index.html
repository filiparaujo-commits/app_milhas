<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Milhas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Sora:wght@300;400;500;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, writeBatch }
                                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Firebase config ────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyADs9yN-WCgfZWpRjARd4JgmstAQQkMLSE",
    authDomain:        "app-milhas-4440f.firebaseapp.com",
    projectId:         "app-milhas-4440f",
    storageBucket:     "app-milhas-4440f.firebasestorage.app",
    messagingSenderId: "619852232899",
    appId:             "1:619852232899:web:917e37be07ae65bd714a76"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;

  // ── Helpers Firestore ──────────────────────────────
  function histRef(uid) {
    return collection(db, "usuarios", uid, "historico_milhas");
  }

  async function carregarHistorico(uid) {
    const q = query(histRef(uid), orderBy("timestamp", "desc"));
    const snap = await getDocs(q);
    const dados = [];
    snap.forEach(d => dados.push({ firestoreId: d.id, ...d.data() }));
    return dados;
  }

  async function salvarRegistro(uid, registro) {
    const docRef = await addDoc(histRef(uid), {
      ...registro,
      timestamp: Date.now()
    });
    return docRef.id;
  }

  async function deletarRegistro(uid, firestoreId) {
    await deleteDoc(doc(db, "usuarios", uid, "historico_milhas", firestoreId));
  }

  async function limparTudo(uid) {
    const snap = await getDocs(histRef(uid));
    const batch = writeBatch(db);
    snap.forEach(d => batch.delete(d.ref));
    await batch.commit();
  }

  // ── Expõe para o escopo global ─────────────────────
  window._firebase = {
    auth, provider, signInWithPopup, signOut,
    carregarHistorico, salvarRegistro, deletarRegistro, limparTudo,
    currentUser: null
  };

  // ── Auth state listener ────────────────────────────
  // onAuthStateChanged cobre tanto login normal quanto retorno do redirect
  onAuthStateChanged(auth, async (user) => {
    console.log('Auth state:', user ? user.email : 'deslogado');
    window._firebase.currentUser = user;

    if (user) {
      try {
        const dados = await carregarHistorico(user.uid);
        window._appSetHistory(dados);
      } catch(e) {
        console.error('Erro ao carregar histórico:', e);
        window._appSetHistory([]);
      }
      window._appOnLogin(user);
    } else {
      window._appOnLogout();
    }
  });
</script>

<style>
  :root {
    --bg:        #0b1210;
    --surface:   #131f1a;
    --surface2:  #192620;
    --border:    #243328;
    --border2:   #2e4238;
    --text:      #dff0e8;
    --text2:     #7fab93;
    --text3:     #456055;
    --accent:    #4ade94;
    --accent2:   #6fefac;
    --accent-dim:  rgba(74,222,148,0.12);
    --accent-dim2: rgba(74,222,148,0.06);
    --good:      #4ade94;
    --good-dim:  rgba(74,222,148,0.12);
    --bad:       #f87171;
    --bad-dim:   rgba(248,113,113,0.12);
    --azul:      #38bdf8;  --azul-dim:  rgba(56,189,248,0.12);
    --gol:       #fb923c;  --gol-dim:   rgba(251,146,60,0.12);
    --latam:     #f472b6;  --latam-dim: rgba(244,114,182,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 40% at 15% 0%,   rgba(74,222,148,0.06) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 85% 100%, rgba(74,222,148,0.04) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 740px;
    margin: 0 auto;
    padding: 44px 20px 80px;
    position: relative; z-index: 1;
  }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    text-align: center;
    gap: 20px;
  }

  .login-icon { font-size: 52px; margin-bottom: 4px; }

  .login-title {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(30px, 6vw, 46px);
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
  }
  .login-title .highlight { color: var(--accent); }

  .login-sub {
    font-size: 15px;
    color: var(--text2);
    max-width: 340px;
    line-height: 1.6;
  }

  .btn-google {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border-radius: 14px;
    background: var(--surface);
    border: 1.5px solid var(--border2);
    color: var(--text);
    font-family: 'Fredoka', sans-serif;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-google:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(74,222,148,0.12);
  }
  .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* ── APP SCREEN ── */
  #appScreen { display: none; }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    object-fit: cover;
  }

  .user-avatar-placeholder {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .user-name {
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
  }

  .btn-logout {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text3);
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-logout:hover { border-color: var(--bad); color: var(--bad); }

  /* ── HEADER ── */
  .eyebrow {
    font-family: 'Sora', sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 10px; opacity: 0.75;
  }

  h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(34px, 7vw, 52px);
    font-weight: 600; color: var(--text);
    line-height: 1.05; letter-spacing: -0.01em;
  }
  h1 .highlight { color: var(--accent); }

  .header-sub { font-size: 14px; color: var(--text2); margin-top: 8px; font-weight: 400; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 26px;
    margin-bottom: 14px;
  }

  .card-label {
    font-family: 'Sora', sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── AIRLINE ── */
  .airline-row { display: flex; gap: 10px; }

  .airline-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 7px;
    padding: 13px 8px; border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--surface2); color: var(--text2);
    font-family: 'Fredoka', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .airline-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text3); transition: background 0.2s; }
  .airline-btn:hover { border-color: var(--border2); color: var(--text); }
  .airline-btn.active[data-airline="azul"]  { border-color: var(--azul);  background: var(--azul-dim);  color: var(--azul);  }
  .airline-btn.active[data-airline="gol"]   { border-color: var(--gol);   background: var(--gol-dim);   color: var(--gol);   }
  .airline-btn.active[data-airline="latam"] { border-color: var(--latam); background: var(--latam-dim); color: var(--latam); }
  .airline-btn.active[data-airline="azul"]  .airline-dot { background: var(--azul);  }
  .airline-btn.active[data-airline="gol"]   .airline-dot { background: var(--gol);   }
  .airline-btn.active[data-airline="latam"] .airline-dot { background: var(--latam); }

  /* ── FIELDS ── */
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block; font-family: 'Sora', sans-serif;
    font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 7px;
  }

  .input-wrap { position: relative; }
  .input-prefix-sym {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-family: 'Sora', sans-serif; font-size: 13px; pointer-events: none;
  }

  input[type="text"] {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 600; padding: 12px 14px;
    outline: none; transition: border-color 0.18s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); font-weight: 400; }
  .has-prefix input { padding-left: 34px; }

  /* ── OPTIONS ── */
  .options-list { display: flex; flex-direction: column; gap: 12px; }

  .option-row {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 16px;
    animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96) translateY(-6px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }

  .option-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .option-num { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 500; color: var(--text3); }
  .option-remove {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 20px; line-height: 1;
    padding: 0 2px; transition: color 0.15s; border-radius: 6px;
  }
  .option-remove:hover { color: var(--bad); }
  .option-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── ADD BTN ── */
  .add-btn {
    width: 100%; margin-top: 10px; padding: 13px;
    border: 1.5px dashed var(--border2); border-radius: 14px;
    background: none; color: var(--text3);
    font-family: 'Fredoka', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim2); }

  /* ── RESUMO ── */
  #resumoCard { display: none; }
  #resumoCard.visible { display: block; }

  .resumo-grid { display: flex; flex-direction: column; gap: 8px; }

  .resumo-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 14px;
    background: var(--surface2); border: 1.5px solid var(--border);
    position: relative; overflow: hidden;
  }
  .resumo-item.melhor { border-color: var(--accent); background: var(--accent-dim2); }
  .resumo-item.melhor::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--accent); border-radius: 4px 0 0 4px;
  }

  .resumo-rank { font-family: 'Fredoka', sans-serif; font-size: 20px; font-weight: 600; color: var(--text3); min-width: 28px; text-align: center; }
  .resumo-item.melhor .resumo-rank { color: var(--accent); }
  .resumo-body { flex: 1; }
  .resumo-label { font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 500; color: var(--text3); margin-bottom: 2px; }
  .resumo-valores { font-size: 13px; color: var(--text2); font-weight: 400; }
  .resumo-milheiro { font-family: 'Fredoka', sans-serif; font-size: 22px; font-weight: 600; color: var(--text2); white-space: nowrap; }
  .resumo-item.melhor .resumo-milheiro { color: var(--accent); }

  .resumo-badge {
    font-family: 'Sora', sans-serif; font-size: 10px; font-weight: 600;
    padding: 3px 9px; border-radius: 20px; white-space: nowrap;
  }
  .badge-melhor   { background: var(--good-dim); color: var(--good); }
  .badge-diff-pos { background: var(--good-dim); color: var(--good); }
  .badge-diff-neg { background: var(--bad-dim);  color: var(--bad);  }
  .badge-hist     { background: var(--accent-dim); color: var(--accent); }

  /* ── ACTIONS ── */
  .actions { display: flex; gap: 10px; margin-top: 18px; }

  .btn {
    padding: 13px 20px; border-radius: 14px;
    font-family: 'Fredoka', sans-serif; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.18s; border: none;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #0b1210; flex: 1; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text2); font-size: 15px; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* ── LOADING SPINNER ── */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(74,222,148,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── HISTORY ── */
  #historySection { display: none; margin-top: 0; }

  .history-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .history-heading { font-family: 'Fredoka', sans-serif; font-size: 24px; font-weight: 600; color: var(--text); }
  .history-count-pill {
    font-family: 'Sora', sans-serif; font-size: 11px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text3); padding: 4px 11px; border-radius: 20px;
  }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-btn {
    padding: 6px 15px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text2); font-family: 'Fredoka', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .history-list { display: flex; flex-direction: column; gap: 9px; }

  .history-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 14px;
    animation: popIn 0.2s ease; transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--border2); }

  .hist-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .hist-body { flex: 1; min-width: 0; }
  .hist-title { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-meta { font-family: 'Sora', sans-serif; font-size: 11px; color: var(--text3); margin-top: 2px; }
  .hist-milheiro { font-family: 'Fredoka', sans-serif; font-size: 20px; font-weight: 600; color: var(--accent); flex-shrink: 0; text-align: right; }
  .hist-milheiro small { display: block; font-family: 'Sora', sans-serif; font-size: 10px; color: var(--text3); font-weight: 400; text-align: right; }
  .hist-best-badge { font-family: 'Sora', sans-serif; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; background: var(--good-dim); color: var(--good); flex-shrink: 0; }
  .hist-delete { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 5px 6px; border-radius: 8px; transition: all 0.15s; flex-shrink: 0; }
  .hist-delete:hover { color: var(--bad); background: var(--bad-dim); }

  .history-empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 15px; }
  .clear-btn { background: none; border: none; color: var(--text3); font-family: 'Sora', sans-serif; font-size: 12px; cursor: pointer; transition: color 0.15s; }
  .clear-btn:hover { color: var(--bad); }

  @media (max-width: 480px) {
    .option-fields { grid-template-columns: 1fr; }
    .airline-row { gap: 7px; }
    .airline-btn { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ── TELA DE LOGIN ── -->
  <div id="loginScreen">
    <div class="login-icon">✈️</div>
    <h1 class="login-title">Valor das <span class="highlight">Milhas</span></h1>
    <p class="login-sub">Faça login com sua conta Google para salvar seu histórico em qualquer dispositivo.</p>
    <button class="btn-google" onclick="fazerLogin()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>
  </div>

  <!-- ── TELA DO APP ── -->
  <div id="appScreen">

    <!-- Topbar -->
    <div class="topbar">
      <div class="user-info">
        <div id="userAvatarWrap"></div>
        <span class="user-name" id="userName"></span>
      </div>
      <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>

    <header style="margin-bottom:28px;">
      <div class="eyebrow">✦ Calculadora</div>
      <h1>Valor das <span class="highlight">Milhas</span></h1>
      <p class="header-sub">Compare opções e descubra qual milheiro compensa mais.</p>
    </header>

    <!-- Companhia -->
    <div class="card">
      <div class="card-label">Companhia aérea</div>
      <div class="airline-row">
        <button class="airline-btn active" data-airline="azul" onclick="selectAirline('azul')">
          <div class="airline-dot"></div>Azul
        </button>
        <button class="airline-btn" data-airline="gol" onclick="selectAirline('gol')">
          <div class="airline-dot"></div>GOL
        </button>
        <button class="airline-btn" data-airline="latam" onclick="selectAirline('latam')">
          <div class="airline-dot"></div>LATAM
        </button>
      </div>
    </div>

    <!-- Referência -->
    <div class="card">
      <div class="card-label">Referência em dinheiro</div>
      <div class="field">
        <label>Valor total da passagem (só dinheiro)</label>
        <div class="input-wrap has-prefix">
          <span class="input-prefix-sym">R$</span>
          <input type="text" id="valorReferencia" placeholder="0,00" oninput="formatarInput(this); calcular()">
        </div>
      </div>
    </div>

    <!-- Opções -->
    <div class="card">
      <div class="card-label">Opções dinheiro + pontos</div>
      <div class="options-list" id="optionsList"></div>
      <button class="add-btn" onclick="addOption()">＋ Adicionar opção</button>
    </div>

    <!-- Resumo -->
    <div class="card" id="resumoCard">
      <div class="card-label">Resumo comparativo</div>
      <div class="resumo-grid" id="resumoGrid"></div>
    </div>

    <!-- Ações -->
    <div class="actions">
      <button class="btn btn-secondary" onclick="toggleHistory()">📋 Histórico</button>
      <button class="btn btn-primary" id="btnSalvar" onclick="salvar()">✦ Salvar resultado</button>
    </div>

    <!-- Histórico -->
    <div id="historySection" style="margin-top:14px;">
      <div class="card">
        <div class="history-top">
          <span class="history-heading">Histórico</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="history-count-pill" id="histCount">0</span>
            <button class="clear-btn" onclick="limparTudo()">Limpar tudo</button>
          </div>
        </div>
        <div class="filters">
          <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
          <button class="filter-btn" onclick="setFilter('azul', this)">Azul</button>
          <button class="filter-btn" onclick="setFilter('gol', this)">GOL</button>
          <button class="filter-btn" onclick="setFilter('latam', this)">LATAM</button>
        </div>
        <div class="history-list" id="histList"></div>
      </div>
    </div>

  </div><!-- /appScreen -->
</div><!-- /container -->

<script>
  // ── State ──────────────────────────────────────────
  let airline      = 'azul';
  let options      = [];
  let counter      = 0;
  let history      = [];
  let activeFilter = 'all';
  let histOpen     = false;

  const airlineColors = { azul: '#38bdf8', gol: '#fb923c', latam: '#f472b6' };
  const airlineNames  = { azul: 'Azul',    gol: 'GOL',     latam: 'LATAM'  };

  // ── Callbacks Firebase → App ────────────────────────
  window._appSetHistory = function(dados) {
    history = dados;
    calcular();
    if (histOpen) renderHistory();
  };

  window._appOnLogin = function(user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display   = 'block';

    document.getElementById('userName').textContent = user.displayName || user.email;

    const wrap = document.getElementById('userAvatarWrap');
    if (user.photoURL) {
      wrap.innerHTML = `<img class="user-avatar" src="${user.photoURL}" referrerpolicy="no-referrer">`;
    } else {
      wrap.innerHTML = `<div class="user-avatar-placeholder">👤</div>`;
    }

    if (!options.length) addOption();
  };

  window._appOnLogout = function() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display   = 'none';
    history = [];
    options = [];
    counter = 0;
    document.getElementById('optionsList').innerHTML = '';
  };

  // ── Auth ───────────────────────────────────────────
  function fazerLogin() {
    if (!window._firebase) { setTimeout(fazerLogin, 100); return; }
    window._firebase.signInWithPopup(window._firebase.auth, window._firebase.provider)
      .catch(e => { console.error(e); alert('Erro ao fazer login. Tente novamente.'); });
  }

  function fazerLogout() {
    if (!window._firebase) return;
    const { auth, signOut } = window._firebase;
    signOut(auth);
  }

  // ── Formatação BR ──────────────────────────────────
  function formatarInput(el) {
    let v = el.value.replace(/[^\d,]/g, '');
    const partes = v.split(',');
    if (partes.length > 2) v = partes[0] + ',' + partes.slice(1).join('');
    el.value = v;
  }

  function parseVal(str) {
    if (!str) return 0;
    return parseFloat(String(str).replace(',', '.')) || 0;
  }

  function fmtBR(num) {
    return num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtPontos(n) {
    return Math.round(n).toLocaleString('pt-BR');
  }

  // ── Airline ────────────────────────────────────────
  function selectAirline(a) {
    airline = a;
    document.querySelectorAll('.airline-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-airline="${a}"]`).classList.add('active');
    calcular();
  }

  // ── Options ────────────────────────────────────────
  function addOption() {
    const id = ++counter;
    options.push(id);

    const el = document.createElement('div');
    el.className = 'option-row';
    el.id = `opt-${id}`;
    el.innerHTML = `
      <div class="option-header">
        <span class="option-num" id="num-${id}">Opção ${options.length}</span>
        <button class="option-remove" onclick="removeOption(${id})">×</button>
      </div>
      <div class="option-fields">
        <div class="field">
          <label>Valor em dinheiro</label>
          <div class="input-wrap has-prefix">
            <span class="input-prefix-sym">R$</span>
            <input type="text" id="din-${id}" placeholder="0,00"
              oninput="formatarInput(this); calcular()">
          </div>
        </div>
        <div class="field">
          <label>Pontos utilizados</label>
          <input type="text" id="pts-${id}" placeholder="0"
            oninput="this.value=this.value.replace(/\\D/g,''); calcular()">
        </div>
      </div>`;

    document.getElementById('optionsList').appendChild(el);
    renumber();
  }

  function removeOption(id) {
    options = options.filter(o => o !== id);
    document.getElementById(`opt-${id}`)?.remove();
    renumber();
    calcular();
  }

  function renumber() {
    options.forEach((id, i) => {
      const el = document.getElementById(`num-${id}`);
      if (el) el.textContent = `Opção ${i + 1}`;
    });
  }

  // ── Calcular ───────────────────────────────────────
  function calcular() {
    const ref      = parseVal(document.getElementById('valorReferencia')?.value);
    const bestHist = getBestHist();
    const resultados = [];

    options.forEach(id => {
      const dinEl = document.getElementById(`din-${id}`);
      const ptsEl = document.getElementById(`pts-${id}`);
      if (!dinEl) return;
      const din = parseVal(dinEl.value);
      const pts = parseFloat(ptsEl.value) || 0;
      if (ref > 0 && pts > 0) {
        const milheiro = ((ref - din) / pts) * 1000;
        resultados.push({ id, din, pts, milheiro, num: options.indexOf(id) + 1 });
      }
    });

    renderResumo(resultados, bestHist);
  }

  function getBestHist() {
    if (!history.length) return null;
    return Math.max(...history.map(h => h.milheiro));
  }

  // ── Resumo ─────────────────────────────────────────
  function renderResumo(resultados, bestHist) {
    const card = document.getElementById('resumoCard');
    const grid = document.getElementById('resumoGrid');
    if (!resultados.length) { card.classList.remove('visible'); return; }

    card.classList.add('visible');
    const sorted   = [...resultados].sort((a, b) => b.milheiro - a.milheiro);
    const melhorId = sorted[0].id;

    grid.innerHTML = sorted.map((r, i) => {
      const isMelhor = r.id === melhorId;
      const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}º`;

      let badge = '';
      if (isMelhor && sorted.length > 1) {
        const diff = ((r.milheiro - sorted[1].milheiro) / sorted[1].milheiro * 100).toFixed(1);
        badge = `<span class="resumo-badge badge-melhor">Melhor opção · +${diff}%</span>`;
      }

      let histBadge = '';
      if (isMelhor && bestHist !== null) {
        const diff = ((r.milheiro - bestHist) / bestHist * 100).toFixed(1);
        if (r.milheiro > bestHist)
          histBadge = `<span class="resumo-badge badge-diff-pos">↑ ${diff}% vs. histórico</span>`;
        else if (r.milheiro < bestHist)
          histBadge = `<span class="resumo-badge badge-diff-neg">↓ ${Math.abs(diff)}% vs. histórico</span>`;
        else
          histBadge = `<span class="resumo-badge badge-hist">= histórico</span>`;
      }

      return `
        <div class="resumo-item${isMelhor ? ' melhor' : ''}">
          <div class="resumo-rank">${rank}</div>
          <div class="resumo-body">
            <div class="resumo-label">Opção ${r.num}</div>
            <div class="resumo-valores">R$ ${fmtBR(r.din)} + ${fmtPontos(r.pts)} pts</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;">${badge}${histBadge}</div>
          </div>
          <div class="resumo-milheiro">R$ ${fmtBR(r.milheiro)}<small>/ milheiro</small></div>
        </div>`;
    }).join('');
  }

  // ── Salvar ─────────────────────────────────────────
  async function salvar() {
    const uid = window._firebase.currentUser?.uid;
    if (!uid) return;

    const ref = parseVal(document.getElementById('valorReferencia').value);
    if (!ref) { alert('Preencha o valor de referência.'); return; }

    const btn = document.getElementById('btnSalvar');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Salvando…`;

    let saved = 0;
    for (const id of options) {
      const din = parseVal(document.getElementById(`din-${id}`)?.value);
      const pts = parseFloat(document.getElementById(`pts-${id}`)?.value) || 0;
      if (pts > 0) {
        const milheiro = ((ref - din) / pts) * 1000;
        const registro = {
          airline, ref, din, pts, milheiro,
          date: new Date().toLocaleDateString('pt-BR')
        };
        const firestoreId = await window._firebase.salvarRegistro(uid, registro);
        history.unshift({ firestoreId, ...registro, timestamp: Date.now() });
        saved++;
      }
    }

    btn.disabled = false;
    if (!saved) {
      btn.textContent = '✦ Salvar resultado';
      alert('Preencha pelo menos uma opção com pontos.');
      return;
    }

    calcular();
    renderHistory();
    if (!histOpen) toggleHistory();

    btn.textContent = `✓ ${saved} ${saved === 1 ? 'opção salva' : 'opções salvas'}`;
    btn.style.background = '#4ade94';
    setTimeout(() => { btn.textContent = '✦ Salvar resultado'; btn.style.background = ''; }, 1800);
  }

  // ── Histórico ──────────────────────────────────────
  function toggleHistory() {
    histOpen = !histOpen;
    document.getElementById('historySection').style.display = histOpen ? 'block' : 'none';
    if (histOpen) {
      renderHistory();
      setTimeout(() => {
        document.getElementById('historySection').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    }
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderHistory();
  }

  function renderHistory() {
    const list    = document.getElementById('histList');
    const countEl = document.getElementById('histCount');

    const filtered = activeFilter === 'all'
      ? history
      : history.filter(h => h.airline === activeFilter);

    countEl.textContent = filtered.length;

    if (!filtered.length) {
      list.innerHTML = `<div class="history-empty">Nenhum resultado salvo ainda.</div>`;
      return;
    }

    const best = Math.max(...filtered.map(h => h.milheiro));

    list.innerHTML = filtered.map(h => `
      <div class="history-item" id="hitem-${h.firestoreId}">
        <div class="hist-dot" style="background:${airlineColors[h.airline]}"></div>
        <div class="hist-body">
          <div class="hist-title">${airlineNames[h.airline]} · R$ ${fmtBR(h.din)} + ${fmtPontos(h.pts)} pts</div>
          <div class="hist-meta">ref R$ ${fmtBR(h.ref)} · ${h.date}</div>
        </div>
        ${h.milheiro === best ? '<span class="hist-best-badge">Melhor</span>' : ''}
        <div class="hist-milheiro">
          R$ ${fmtBR(h.milheiro)}
          <small>por milheiro</small>
        </div>
        <button class="hist-delete" onclick="deletarItem('${h.firestoreId}')" title="Remover">🗑</button>
      </div>
    `).join('');
  }

  async function deletarItem(firestoreId) {
    const uid = window._firebase.currentUser?.uid;
    if (!uid) return;

    const el = document.getElementById(`hitem-${firestoreId}`);
    if (el) {
      el.style.transition = 'opacity 0.2s, transform 0.2s';
      el.style.opacity = '0';
      el.style.transform = 'translateX(10px)';
    }

    await window._firebase.deletarRegistro(uid, firestoreId);
    history = history.filter(h => h.firestoreId !== firestoreId);
    setTimeout(() => { calcular(); renderHistory(); }, 220);
  }

  async function limparTudo() {
    const uid = window._firebase.currentUser?.uid;
    if (!uid) return;
    if (!confirm('Limpar todo o histórico?')) return;
    await window._firebase.limparTudo(uid);
    history = [];
    calcular();
    renderHistory();
  }
</script>
</body>
</html>
